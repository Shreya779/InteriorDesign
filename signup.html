<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Design Sign-Up Page</title>
    <link rel="stylesheet" href="signup.css"> <!-- Custom CSS for styling -->
    <form action="signup.php" method="post"></form>
</head>
<body>

    <div class="form-wrapper">
        <h2>Sign Up</h2>
        <form action="signup.php" method="post"> <!-- Adjust action as needed -->
            <div class="form-control">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>
            <div class="form-control">
                <input type="tel" name="phone_number" required>
                <label>Phone Number</label>
            </div>
            <div class="form-control">
                <input type="text" name="address" required>
                <label>Address</label>
            </div>
            <div class="form-control">
                <select name="gender" required>
                    <option value="" disabled selected hidden>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
                
            </div>
            <div class="form-control">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>
            <div class="form-control">
                <input type="number" name="age" min="1" required>
                <label>Age</label>
            </div>
            <div class="form-control">
                <input type="date" name="date_of_birth" required>
                
            </div>
            <div class="form-control">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Sign In</a></p> <!-- Link to login page -->
        
    </div>

    <script>
        // Optionally add JavaScript for additional interactivity or validation
    </script>

</body>
</html>
