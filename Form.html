<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Dimensions Form</title>
<link rel="stylesheet" href="form.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>


    


<div id="dimensions-form">
    <h1>Dimensions of Room</h1>
    <img src="IMG/Room_Dimensions_rev02.jpg" length="100px" width="150px">
    <label for="width">Width:</label>
    <input type="range" id="width" name="width" min="0" max="50">
    <input type="number" id="width-input" name="width_input" min="0" max="50"> <!-- Change name to width_input -->
    <span id="width-value"> ft</span><br>
    <label for="length">Length:</label>
    <input type="range" id="length" name="length" min="0" max="50">
    <input type="number" id="length-input" name="length_input" min="0" max="50"> <!-- Change name to length_input -->
    <span id="length-value"> ft</span><br>
    <button type="button" id="next-dimension-button1"><a href="form2.html" style="color: white;text-decoration: none;">Back</a></button>

    <button type="button" id="next-dimension-button">Next</button>


</div>

<!-- Sofa selection section -->
<div id="sofa-selection" style="display:none;">
    <h2>Living Room Requirements</h2>
    <h3>1. Select Sofa Type You Want</h3>
    <div class="option">
    <div class="sofa-option">
        <label>
            <img src="IMG/Corner.png" alt="Corner Sofa">
            <input type="radio" name="sofa-type" value="corner-sofa"> <!-- Change name to sofa_type -->
            Corner Sofa
        </label>
    </div>
    <div class="sofa-option">
        <label>
            <img src="IMG/3_1_1.png" alt="3:1:1 Sofa">
            <input type="radio" name="sofa-type" value="3-1-1-sofa"> <!-- Change name to sofa_type -->
            3:1:1 Sofa
        </label>
    </div>
    <div class="sofa-option">
        <label>
            <img src="IMG/3_2_1.png" alt="3:2:1 Sofa">
            <input type="radio" name="sofa-type" value="3-2-1-sofa"> <!-- Change name to sofa_type -->
            3:2:1 Sofa
        </label>
    </div>
</div>
    <button type="button" id="back-sofa-button">Back</button>
    <button type="button" id="next-sofa-button">Next</button>
</div>

<!-- Furniture selection section -->
<div id="furniture-selection" style="display:none;">
    <h2>Living Area Furniture</h2>
    <h3>2. Other furniture needed in your Living Area</h3>
    <div class="option">
        <div class="furniture-option">
            <label>
                <img src="IMG/016.png" alt="Shoe Rack">
                <input type="checkbox" name="living-area-furniture[]" value="shoe-rack"> <!-- Change name to living-area-furniture[] -->
                Shoe Rack
            </label>
        </div>
        <div class="furniture-option">
            <label>
                <img src="IMG/side_table.png" alt="Side Table">
                <input type="checkbox" name="living-area-furniture[]" value="side-table"> <!-- Change name to living-area-furniture[] -->
                Side Table
            </label>
        </div>
        <div class="furniture-option">
            <label>
                <img src="IMG/seater.png" alt="Center Table">
                <input type="checkbox" name="living-area-furniture[]" value="center-table"> <!-- Change name to living-area-furniture[] -->
                Center Table
            </label>
        </div>
        <div class="furniture-option">
            <label>
                <img src="IMG/icons8-tv-show-80.png" alt="TV Unit">
                <input type="checkbox" name="living-area-furniture[]" value="tv-unit"> <!-- Change name to living-area-furniture[] -->
                TV Unit
            </label>
        </div>
    </div>
    <button type="button" id="back-furniture-button">Back</button>
    <button type="button" id="next-furniture-button">Next</button>
</div>

<!-- Lighting selection section -->
<div id="lighting-selection" style="display:none;">
    <h2>Lighting Options</h2>
    <h3>3. Select Types of Lighting for your Living Area</h3>
    <div class="option">
        <div class="lighting-option">
            <label>
                <img src="IMG/table-lamp-mdaLawD-600.jpeg" alt="Table Lamp">
                <input type="checkbox" name="living-area-lighting[]" value="table-lamp"> <!-- Change name to living-area-lighting[] -->
                Table Lamp
            </label>
        </div>
        <div class="lighting-option">
            <label>
                <img src="IMG/modern-floor-lamp-G9ym8QB-600.jpeg" alt="Floor Lamp">
                <input type="checkbox" name="living-area-lighting[]" value="floor-lamp"> <!-- Change name to living-area-lighting[] -->
                Floor Lamp
            </label>
        </div>
        <div class="lighting-option">
            <label>
                <img src="IMG/icons8-lights-80(3).png" alt="Ceiling Lighting">
                <input type="checkbox" name="living-area-lighting[]" value="ceiling-lighting"> <!-- Change name to living-area-lighting[] -->
                Ceiling Lighting
            </label>
        </div>
        <div class="lighting-option">
            <label>
                <img src="IMG/icons8-chandelier-240(2).png" alt="Chandelier">
                <input type="checkbox" name="living-area-lighting[]" value="pendant-lighting"> <!-- Change name to living-area-lighting[] -->
                Chandelier
            </label>
        </div>
    </div>
    <button type="button" id="back-lighting-button">Back</button>
    <button type="button" id="next-lighting-button">Next</button>
</div>




<!-- Paint selection section -->
<div id="paint-selection" style="display:none;">
    <h2>Living Room Requirements</h2>
    <h3>4. Paint</h3>
    <div class="paint-option">
        <label>
            <img src="IMG/bucket_1.png" length="20px" bredth="20px" alt="Tractor Emulsion Paint">
            <input type="radio" name="paint-type" value="tractor-emulsion"> <!-- Change name to paint_type -->
            Tractor Emulsion Paint
        </label>
    </div>
    <div class="paint-option">
        <label>
            <img src="IMG/bucket_2.png" alt="Apcolite Advance Paint">
            <input type="radio" name="paint-type" value="apcolite-advance"> <!-- Change name to paint_type -->
            Apcolite Advance Paint
        </label>
    </div>
    <div class="paint-option">
        <label>
            <img src="IMG/bucket_3.png" alt="Royale Paint">
            <input type="radio" name="paint-type" value="royale"> <!-- Change name to paint_type -->
            Royale Paint
        </label>
    </div>
    <button type="button" id="back-paint-button">Back</button>
    <button type="submit" id="submit-button">Submit</button>
</div>

<script src="form.js"></script>

</body>
</html>
